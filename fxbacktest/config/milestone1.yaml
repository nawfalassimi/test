pair: EURUSD
assumed_foreign_rate: 0.0

data:
  start: "2022-01-01"
  end: "2023-12-29"
  seed: 42
  path: data/synthetic/eurusd_quotes.csv

strategy:
  name: short_vol_carry_1m
  tenor_days: 30
  entry_weekday: 0
  notional: 1000000

hedging:
  mode: daily

transaction_costs:
  EURUSD:
    option:
      kind: vol_spread # or premium_spread
      vol_spread_bp: 50 # half-spread in vol points applied to option entry/exit
      premium_spread_bp: 0 # used instead, if kind == premium_spread
    spot:
      spread_pips: 1.0 # half-spread in pips applied to hedge fills
  default:
    option:
      kind: vol_spread
      vol_spread_bp: 75
    spot:
      spread_pips: 2.0

execution_timing: same_day_close
